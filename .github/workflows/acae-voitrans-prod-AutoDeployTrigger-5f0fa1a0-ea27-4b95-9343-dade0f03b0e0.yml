name: Trigger auto deployment for acae-voitrans-prod

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/acae-voitrans-prod-AutoDeployTrigger-5f0fa1a0-ea27-4b95-9343-dade0f03b0e0.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACAEVOITRANSPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ACAEVOITRANSPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ACAEVOITRANSPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.ACAEVOITRANSPROD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ACAEVOITRANSPROD_REGISTRY_PASSWORD }}
          containerAppName: acae-voitrans-prod
          resourceGroup: chenliuyu
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


